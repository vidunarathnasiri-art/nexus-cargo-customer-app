<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nexus Cargo – Price Calculator</title>

<style>
body{font-family:Arial,sans-serif;padding:20px;background:#f4f4f4;margin:0;}
.container{max-width:460px;margin:auto;background:white;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
input,select{width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:5px;}
button{width:100%;padding:12px;background:#007bff;color:white;border:none;border-radius:5px;font-size:16px;cursor:pointer;}
.result{margin-top:15px;padding:10px;background:#e9ecef;border-radius:5px;font-size:18px;text-align:center;}
</style>
</head>

<body>
<div class="container">

<label>Weight (kg):</label>
<input type="number" id="weight" />

<label>Your Phone Number:</label>
<input type="tel" id="customerPhone" />

<!-- ✅ BL hidden -->
<input type="hidden" id="blNumber" />

<label>Shipping Type:</label>
<select id="shippingType">
<option value="door">Door to Door</option>
<option value="pickup">Door + Pickup</option>
<option value="warehouse">Warehouse</option>
<option value="pickupWarehouse">Warehouse + Pickup</option>
</select>

<label>Package Type:</label>
<select id="packageType">
<option value="full">Full (up to 35kg)</option>
<option value="half">Half (up to 17kg)</option>
</select>

<button onclick="calculatePrice()">Calculate Price</button>

<div class="result" id="price">Price: $0 AUD</div>

<button onclick="sendWhatsApp()">Send via WhatsApp</button>

</div>

<script>

var BUSINESS_NUMBER="61419728660";

function calculatePrice(){
var w=parseFloat(document.getElementById("weight").value);
if(!w){alert("Enter weight");return;}

var price = w <= 35 ? w * 2.5 : (35*2.5) + ((w-35)*2);
document.getElementById("price").innerText="Price: $"+price.toFixed(2)+" AUD";
return price;
}

async function fetchNextBL(){
const res = await fetch("/api/next-bl",{method:"POST"});
const data = await res.json();
return data.blNumber;
}

async function sendWhatsApp(){

var price = calculatePrice();
if(!price) return;

// ✅ BL generate ONLY here
var blField = document.getElementById("blNumber");

if(!blField.value){
   const bl = await fetchNextBL();
   blField.value = bl;
}

var bl = blField.value;

var msg="Cargo Booking Receipt\n";
msg+="BL: "+bl+"\n";
msg+="Weight: "+document.getElementById("weight").value+"kg\n";
msg+="Phone: "+document.getElementById("customerPhone").value+"\n";
msg+="Price: $"+price+" AUD";

window.open("https://wa.me/"+BUSINESS_NUMBER+"?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
